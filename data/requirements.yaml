meta:
  version: "0.0.2"
  project: "High Power Buck Converter"

extras:
  tables:
    input_source_physical_characteristics:
      columns: ["Description", "Min", "Typ", "Max", "Unit"]
      rows:
        input_voltage:
          description: "Input Voltage"
          min: "$5.0$"
          typ: "$7.2$"
          max: "$8.4$"
          unit: "$V$"
        input_current:
          description: "Input Current"
          min: "$25$"
          typ: "$35$"
          max: "$-$"
          unit: "$A$"
        internal_resistance:
          description: "Internal Resistance"
          min: "$-$"
          typ: "$15$"
          max: "$20$"
          unit: "$m \\Omega$"
    general_output_characteristics:
      columns: ["Description", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        volt_ripple_p_p:
          description: "Volt ripple peak to peak"
          min: "[TBD]"
          typ: "[TBD]"
          max: "[TBD]"
          unit: "$V$"
          requirement_code: "**REQ_OUT_018**{: #REQ_OUT_018 }"
        current_ripple_p_p:
          description: "Current ripple peak to peak"
          min: "[TBD]"
          typ: "[TBD]"
          max: "[TBD]"
          unit: "$A$"
          requirement_code: "**REQ_OUT_019**{: #REQ_OUT_019 }"
        efficiency:
          description: "Efficiency"
          min: "[TBD]"
          typ: "[TBD]"
          max: "[TBD]"
          unit: "$\\text %$"
          requirement_code: "**REQ_OUT_020**{: #REQ_OUT_020 }"
        transient_response_time:
          description: "Transient response time"
          min: "[TBD]"
          typ: "[TBD]"
          max: "[TBD]"
          unit: "$ms$"
          requirement_code: "**REQ_OUT_021**{: #REQ_OUT_021 }"

modes:
  standby:
    input_power:
      columns: ["Description", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        operating_input_voltage:
          description: "Operating Input Voltage"
          min: "$6.1$"
          typ: "$7.2$"
          max: "$10$"
          unit: "$V$"
          requirement_code: "**REQ_INP_001**{: #REQ_INP_001 }"
        input_current_draw:
          description: "Input Current Draw"
          min: "$-$"
          typ: "[TBD]"
          max: "[TBD]"
          unit: "$\\mu A$"
          requirement_code: "**REQ_INP_002**{: #REQ_INP_002 }"
        active_mode_lockout:
          description: ["Active Mode lockout"]
          min: ["$6.4$", "$-$"]
          typ: ["$-$", "$-$"]
          max: ["$-$", "$95$"]
          unit: ["$V$", "$^{\\circ}C$"]
          requirement_code: ["**REQ_INP_003**{: #REQ_INP_003 }", "**REQ_INP_004**{: #REQ_INP_004 }"]
        restricted_mode_lockout:
          description: "Restricted mode lockout"
          min: "$-$"
          typ: "$-$"
          max: "$95$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_INP_005**{: #REQ_INP_005 }"
        auto_deep_sleep_activation:
          description: "Auto Deep Sleep mode activation"
          min: "$6.0$"
          typ: "$-$"
          max: "$-$"
          unit: "$V$"
          requirement_code: "**REQ_INP_006**{: #REQ_INP_006 }"
        auto_restricted_mode_activation:
          description: ["Auto Restricted mode activation in case of low quality source detection or over-temperature detection"]
          min: ["$-$", "$-$"]
          typ: ["$-$", "$-$"]
          max: ["$70$", "$70$"]
          unit: ["$m \\Omega$", "$^{\\circ}C$"]
          requirement_code: ["**REQ_INP_007**{: #REQ_INP_007 }", "**REQ_INP_008**{: #REQ_INP_008 }"]
    output_power:
      columns: ["Description", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        output_voltage:
          description: "Output Voltage"
          min: "$-$"
          typ: "$-$"
          max: "$0$"
          unit: "$V$"
          requirement_code: "**REQ_OUT_001**{: #REQ_OUT_001 }"
        active_rest_lockout:
          description: ["Active/Restricted mode Lockout"]
          min: ["$0.02^{[1]}$", "$-$"]
          typ: ["$-$", "$-$"]
          max: ["$-$", "$115$"]
          unit: ["$\\Omega$", "$^{\\circ}C$"]
          requirement_code: ["**REQ_OUT_002**{: #REQ_OUT_002 }", "**REQ_OUT_003**{: #REQ_OUT_003 }"]
        auto_rest_entering:
          description: "Auto Restricted mode entering"
          min: "$-$"
          typ: "$-$"
          max: "$100$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_OUT_004**{: #REQ_OUT_004 }"

  deep_sleep:
    input_power:
      columns: ["Description", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        operating_input_voltage:
          description: "Operating Input Voltage"
          min: "$5.1$"
          typ: "$7.2$"
          max: "$10$"
          unit: "$V$"
          requirement_code: "**REQ_INP_009**{: #REQ_INP_009 }"
        input_current:
          description: "Input Current"
          min: "$-$"
          typ: "[TBD]"
          max: "[TBD]"
          unit: "$\\mu A$"
          requirement_code: "**REQ_INP_010**{: #REQ_INP_010 }"
    output_power:
      columns: ["Description", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        output_voltage:
          description: "Output Voltage"
          min: "$-$"
          typ: "$-$"
          max: "$0$"
          unit: "$V$"
          requirement_code: "**REQ_OUT_005**{: #REQ_OUT_005 }"

  active:
    input_power:
      columns: ["Description", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        operating_input_voltage:
          description: "Operating Input Voltage"
          min: "$5.1$"
          typ: "$7.2$"
          max: "$10$"
          unit: "$V$"
          requirement_code: "**REQ_INP_011**{: #REQ_INP_011 }"
        input_current:
          description: "Input Current"
          min: "$-$"
          typ: "$-$"
          max: "$20$"
          unit: "$A$"
          requirement_code: "**REQ_INP_012**{: #REQ_INP_012 }"
        auto_standby_entering:
          description: "Auto Standby mode entering"
          min: "$-$"
          typ: "$-$"
          max: "$105$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_INP_013**{: #REQ_INP_013 }"
    output_power:
      columns: ["Description", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        output_voltage:
          description: "Output Voltage"
          min: "$-$"
          typ: "$-$"
          max: "$5$"
          unit: "$V$"
          requirement_code: "**REQ_OUT_006**{: #REQ_OUT_006 }"
        output_current:
          description: "Output Current"
          min: "$-$"
          typ: "$-$"
          max: "$30$"
          unit: "$A$"
          requirement_code: "**REQ_OUT_007**{: #REQ_OUT_007 }"
        output_power:
          description: "Output Power"
          min: "$-$"
          typ: "$-$"
          max: "$90$"
          unit: "$W$"
          requirement_code: "**REQ_OUT_008**{: #REQ_OUT_008 }"
        auto_standby_mode_entering:
          description: "Auto Standby mode entering"
          min: "$-$"
          typ: "$-$"
          max: "$120$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_OUT_009**{: #REQ_OUT_009 }"
        auto_rest:
          description: "Auto Restricted mode entering"
          min: "$-$"
          typ: "$-$"
          max: "$90$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_OUT_010**{: #REQ_OUT_010 }"

  restricted:
    input_power:
      columns: ["Description", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        operating_input_voltage:
          description: "Operating Input Voltage"
          min: "$5.1$"
          typ: "$7.2$"
          max: "$10$"
          unit: "$V$"
          requirement_code: "**REQ_INP_014**{: #REQ_INP_014 }"
        input_current:
          description: "Input Current"
          min: "$-$"
          typ: "$-$"
          max: "$15$"
          unit: "$A$"
          requirement_code: "**REQ_INP_015**{: #REQ_INP_015 }"
        auto_standby_entering:
          description: "Auto Standby mode entering"
          min: "$-$"
          typ: "$-$"
          max: "$105$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_INP_016**{: #REQ_INP_016 }"
        auto_active_entering:
          description: "Auto Active mode entering"
          min: "$-$"
          typ: "$-$"
          max: "$60$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_INP_017**{: #REQ_INP_017 }"
    output_power:
      columns: ["Description", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        output_voltage:
          description: "Output Voltage"
          min: "$-$"
          typ: "$-$"
          max: "$5$"
          unit: "$V$"
          requirement_code: "**REQ_OUT_011**{: #REQ_OUT_011 }"
        output_current:
          description: "Output Current"
          min: "$-$"
          typ: "$-$"
          max: "$20$"
          unit: "$A$"
          requirement_code: "**REQ_OUT_012**{: #REQ_OUT_012 }"
        output_power:
          description: "Output Power"
          min: "$-$"
          typ: "$-$"
          max: "$70$"
          unit: "$W$"
          requirement_code: "**REQ_OUT_013**{: #REQ_OUT_013 }"
        auto_standby_mode_entering:
          description: "Auto Standby mode entering"
          min: "$-$"
          typ: "$-$"
          max: "$120$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_OUT_014**{: #REQ_OUT_014 }"
        auto_active_mode_entering:
          description: "Auto Active mode entering"
          min: "$85$"
          typ: "$-$"
          max: "$-$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_OUT_015**{: #REQ_OUT_015 }"

  fail_safe:
    input_power:
      columns: ["Description", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        continuous_voltage_no_damage:
          description: "Continuous Input Voltage without damage"
          min: "$-30$"
          typ: "$-$"
          max: "$30$"
          unit: "$V$"
          requirement_code: "**REQ_INP_018**{: #REQ_INP_018 }"
        auto_fail_safe_entering:
          description: ["Auto Fail-Safe mode entering"]
          min: ["$-$", "$5$"]
          typ: ["$-$", "$-$"]
          max: ["$25$", "$12$"]
          unit: ["$A$", "$V$"]
          requirement_code: ["**REQ_INP_019**{: #REQ_INP_019 }", "**REQ_INP_020**{: #REQ_INP_020 }"]
    output_power:
      columns: ["Description", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        output_voltage:
          description: "Output Voltage"
          min: "$-$"
          typ: "$-$"
          max: "$0$"
          unit: "$V$"
          requirement_code: "**REQ_OUT_016**{: #REQ_OUT_016 }"
        auto_standby_mode_entering:
          description: "Auto Standby mode entering"
          min: "$-$"
          typ: "$-$"
          max: "$35$"
          unit: "$A$"
          requirement_code: "**REQ_OUT_017**{: #REQ_OUT_017 }"