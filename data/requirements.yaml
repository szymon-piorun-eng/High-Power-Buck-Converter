meta:
  version: "0.0.1"
  project: "High Power Buck Converter"

extras:
  tables:
    input_source_physical_characteristics:
      columns: ["Description", "Symbol", "Min", "Typ", "Max", "Unit"]
      rows:
        input_voltage:
          description: "Input Voltage"
          symbol: "$V_{in}$"
          min: "$5.0$"
          typ: "$7.2$"
          max: "$8.4$"
          unit: "$V$"
        input_current:
          description: "Input Current"
          symbol: "$I_{in}$"
          min: "$25$"
          typ: "$35$"
          max: "$-$"
          unit: "$A$"
        internal_resistance:
          description: "Internal Resistance"
          symbol: "$R_{int}$"
          min: "$-$"
          typ: "$15$"
          max: "$20$"
          unit: "$m \\Omega$"

modes:
  standby:
    input_power:
      columns: ["Description", "Symbol", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        operating_input_voltage:
          description: "Operating Input Voltage"
          symbol: "$V_{in}$"
          min: "$6.1$"
          typ: "$7.2$"
          max: "$10$"
          unit: "$V$"
          requirement_code: "**REQ_INP_001**{: #REQ_INP_001 }"
        
        input_current_draw:
          description: "Input Current Draw"
          symbol: "$I_{in}$"
          min: "$-$"
          typ: "[TBD]"
          max: "[TBD]"
          unit: "$\\mu A$"
          requirement_code: "**REQ_INP_002**{: #REQ_INP_002 }"

        active_mode_lockout:
          description: ["Active Mode lockout"]
          symbol: ["$V_{th(Active)}$", "$t_{th(Active)}$"]
          min: ["$6.4$", "$-$"]
          typ: ["$-$", "$-$"]
          max: ["$-$", "$95$"]
          unit: ["$V$", "$^{\\circ}C$"]
          requirement_code: ["**REQ_INP_003**{: #REQ_INP_003 }", "**REQ_INP_004**{: #REQ_INP_004 }"]

        restricted_mode_lockout:
          description: "Restricted mode lockout"
          symbol: "$t_{th(Restricted)}$"
          min: "$-$"
          typ: "$-$"
          max: "$95$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_INP_005**{: #REQ_INP_005 }"

        auto_deep_sleep_activation:
          description: "Auto Deep Sleep mode activation"
          symbol: "$V_{th(DeepSleep)}$"
          min: "$6.0$"
          typ: "$-$"
          max: "$-$"
          unit: "$V$"
          requirement_code: "**REQ_INP_006**{: #REQ_INP_006 }"

        auto_restricted_mode_activation:
          description: ["Auto Restricted mode activation in case of low quality source detection or over-temperature detection"]
          symbol: ["$Z_{src(Restricted)}$", "$t_{th(Restricted)}$"]
          min: ["$-$", "$-$"]
          typ: ["$-$", "$-$"]
          max: ["$70$", "$70$"]
          unit: ["$m \\Omega$", "$^{\\circ}C$"]
          requirement_code: ["**REQ_INP_007**{: #REQ_INP_007 }", "**REQ_INP_008**{: #REQ_INP_008 }"]

  deep_sleep:
    input_power:
      columns: ["Description", "Symbol", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        operating_input_voltage:
          description: "Operating Input Voltage"
          symbol: "$V_{in}$"
          min: "$5.1$"
          typ: "$7.2$"
          max: "$10$"
          unit: "$V$"
          requirement_code: "**REQ_INP_009**{: #REQ_INP_009 }"
        input_current:
          description: "Input Current"
          symbol: "$I_{in}$"
          min: "$-$"
          typ: "[TBD]"
          max: "[TBD]"
          unit: "$\\mu A$"
          requirement_code: "**REQ_INP_010**{: #REQ_INP_010 }"

  active:
    input_power:
      columns: ["Description", "Symbol", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        operating_input_voltage:
          description: "Operating Input Voltage"
          symbol: "$V_{in}$"
          min: "$5.1$"
          typ: "$7.2$"
          max: "$10$"
          unit: "$V$"
          requirement_code: "**REQ_INP_011**{: #REQ_INP_011 }"
        input_current:
          description: "Input Current"
          symbol: "$I_{in}$"
          min: "$-$"
          typ: "$-$"
          max: "$20$"
          unit: "$A$"
          requirement_code: "**REQ_INP_012**{: #REQ_INP_012 }"
        auto_standby_entering:
          description: "Auto Standby mode entering"
          symbol: "$t_{th(Standby)}$"
          min: "$-$"
          typ: "$-$"
          max: "$105$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_INP_013**{: #REQ_INP_013 }"

  restricted:
    input_power:
      columns: ["Description", "Symbol", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        operating_input_voltage:
          description: "Operating Input Voltage"
          symbol: "$V_{in}$"
          min: "$5.1$"
          typ: "$7.2$"
          max: "$10$"
          unit: "$V$"
          requirement_code: "**REQ_INP_014**{: #REQ_INP_014 }"
        input_current:
          description: "Input Current"
          symbol: "$I_{in}$"
          min: "$-$"
          typ: "$-$"
          max: "$15$"
          unit: "$A$"
          requirement_code: "**REQ_INP_015**{: #REQ_INP_015 }"
        auto_standby_entering:
          description: "Auto Standby mode entering"
          symbol: "$t_{th(Standby)}$"
          min: "$-$"
          typ: "$-$"
          max: "$105$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_INP_016**{: #REQ_INP_016 }"
        auto_active_entering:
          description: "Auto Active mode entering"
          symbol: "$t_{th(Active)}$"
          min: "$-$"
          typ: "$-$"
          max: "$60$"
          unit: "$^{\\circ}C$"
          requirement_code: "**REQ_INP_017**{: #REQ_INP_017 }"

  fail_safe:
    input_power:
      columns: ["Description", "Symbol", "Min", "Typ", "Max", "Unit", "Requirement Code"]
      rows:
        continuous_voltage_no_damage:
          description: "Continuous Input Voltage without damage"
          symbol: "$V_{in}$"
          min: "$-30$"
          typ: "$-$"
          max: "$30$"
          unit: "$V$"
          requirement_code: "**REQ_INP_018**{: #REQ_INP_018 }"
        auto_fail_safe_entering:
          description: ["Auto Fail-Safe mode entering"]
          symbol: ["$I_{th(FailSafe)}$", "$V_{th(FailSafe)}$"]
          min: ["$-$", "$5$"]
          typ: ["$-$", "$-$"]
          max: ["$25$", "$12$"]
          unit: ["$A$", "$V$"]
          requirement_code: ["**REQ_INP_019**{: #REQ_INP_019 }", "**REQ_INP_020**{: #REQ_INP_020 }"]
      software:
        variables: "[Fail_Safe mode flag]"